<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Photomanager</title>
    <style>
        body {
            text-align: center;
            padding: 60px 20px;
            font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            margin: 0 auto;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #666; margin: 8px 0 24px; font-size: 14px; }
        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: #0f3460;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn:hover { background: #1a5276; }
        .hint {
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }
        .status {
            margin-top: 16px;
            font-size: 13px;
            color: #e67e22;
        }
        .status.online { color: #27ae60; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📸 Photomanager</h1>
        <p>零样本图片分类 + 语义搜索</p>
        <a class="btn" href="http://127.0.0.1:8000" target="_blank">打开系统</a>
        <div class="status" id="status">检查服务状态...</div>
        <div class="hint">
            服务未启动？在终端运行：<br>
            <code>python main.py</code>
        </div>
    </div>

    <script>
        fetch('http://127.0.0.1:8000/api/stats')
            .then(r => r.json())
            .then(d => {
                document.getElementById('status').textContent =
                    `✅ 服务运行中 — ${d.total_images} 张图片`;
                document.getElementById('status').className = 'status online';
            })
            .catch(() => {
                document.getElementById('status').textContent =
                    '❌ 服务未启动，请先运行 python main.py';
            });
    </script>
</body>
</html>
